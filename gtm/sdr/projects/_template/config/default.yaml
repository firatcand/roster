# Outreach Agent Config — <Project>

# See gtm/sdr/agent.md § "Inputs" for required fields.
# Use prose comments to explain "why" alongside "what".

target_personas: []        # slugs from projects/<project>/guidelines/icps/

channels:
  primary: linkedin        # linkedin | email | auto
  fallback: email
  reasoning: "..."

cap:
  weekly: 10
  daily: 3

approval_channel: auto     # auto | session | slack | none

writer_settings:
  max_length:
    linkedin: 280          # chars
    email: 100             # words
  required_personalization:
    - one_specific_signal_from_enrichment
    - one_voice_anchor_from_voice_md

critic_settings:
  block_on:
    - unverified_claims
    - aggressive_language
    - compliance_violations
    - do_and_dont_violations
  iteration_cap: 2

scoring_threshold: 7.0

dedup:
  lookback_days: 90
  rule: "Do not contact same person within 90 days regardless of channel"
