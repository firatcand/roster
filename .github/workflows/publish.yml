name: Publish
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist, e.g. v0.1.0)'
        required: true
permissions:
  contents: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gates manual workflow_dispatch behind the `production` environment's required-reviewer rule.
    # Empty string on push.tags = no environment, no approval friction on the canonical release path.
    environment: ${{ github.event_name == 'workflow_dispatch' && 'production' || '' }}
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate tag format
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::TAG '$TAG' is not a valid SemVer tag (expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE)."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Assert NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set. Go to Settings → Secrets and variables → Actions and add NPM_TOKEN."
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Assert tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION. Bump package.json or retag."
            exit 1
          fi
      - run: pnpm build
      - run: npm pack --dry-run
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "$TAG" =~ -.+ ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create (workflow_dispatch re-run after partial publish)."
            exit 0
          fi
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ -.+ ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
