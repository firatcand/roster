plan: audit-agent
description: |
  Validate one agent at its flat shape `<function>/<agent>/`. Checks required
  agent.md sections, README.md, config.yaml, .env (optional, agent-scoped),
  .mcp.json, .claude/settings.json, subagents/, playbook/, plans/, and the
  slash command at .claude/commands/<agent>.md.

inputs:
  function:
    required: true
    description: Function slug.
  agent:
    required: true
    description: Agent slug.

outputs:
  status: string  # pass | warn | fail
  report_path: string

steps:
  - id: execute
    tool: bash
    args:
      command: bash scripts/audit-agent.sh ${inputs.function} ${inputs.agent}
    description: Run the backing audit script.

  - id: report
    description: |
      Print the summary. Reference the full report at
      chief-of-staff/logs/<YYYY-MM>/audit-${inputs.function}-${inputs.agent}-<YYYY-MM-DD-HHMM>.md.

approval_channel: session
