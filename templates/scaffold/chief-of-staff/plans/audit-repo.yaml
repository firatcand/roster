plan: audit-repo
description: |
  Full workspace audit. Runs agent audits for every live agent and aggregates
  into one report. Also checks workspace completeness: root CLAUDE.md,
  conventions.md, README.md, config/project.yaml, guidelines/,
  .config/functions.yaml, universal .mcp.json, and universal
  .claude/settings.json.

inputs: {}

outputs:
  status: string  # pass | warn | fail
  report_path: string

steps:
  - id: execute
    tool: bash
    args:
      command: bash scripts/audit-repo.sh
    description: Run the backing aggregator script.

  - id: report
    description: |
      Print top-level summary. Reference the full report at
      chief-of-staff/logs/<YYYY-MM>/audit-repo-<YYYY-MM-DD-HHMM>.md.

approval_channel: session
